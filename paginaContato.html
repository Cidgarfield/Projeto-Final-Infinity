<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../Style/styleContato.css">
    <title>Contato</title>
</head>
<body>
    <header>
        <img src="../Image/MolduraEsquerda.png" alt="">
        <h1>Contato</h1>
        <button onclick="window.location.href='../Templates/paginaInicial.html'">Voltar</button>
        <img src="../Image/MolduraDireita.png" alt="">
    </header>

    <button id="btnEditar" 
        class="btn btn-success"
        data-bs-toggle="modal" 
        data-bs-target="#modalContato"
        style="visibility: hidden;">
    Editar Contato
    </button>


    <div id="conteudo">
        <div class="fundo"></div>
        <div class="textoContato">
            <h2>Contato</h2>
            <p>Para entrar em contato conosco, utilize os canais abaixo:</p>
        </div>
        <div id="listaContato" class="container mt-4">
            
        </div>
    </div>

    <div class="modal fade" id="modalContato" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">

                <div class="modal-header">
                    <h5 class="modal-title">Editar Contato</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="formContato">
                
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-telephone-fill me-2"></i>Telefone
                            </label>
                            <input type="text" class="form-control" id="telefoneContato" required>
                        </div>   

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope-fill me-2"></i>Email
                            </label>
                            <input type="email" class="form-control" id="emailContato" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-geo-alt-fill me-2"></i>Endereço
                            </label>
                            <input type="text" class="form-control" id="enderecoContato" required>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="salvarContato()">Salvar</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../Script/contato.js"></script>

</body>
</html>
