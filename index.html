<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Style/style.css">

</head>

<body>
    <header class="header">
        <img src="../Image/Moldura.png" alt="Moldura" class="moldura">
    </header>

    <div class="login-container">
        <div class="login-content">
            <img src="../Image/Logo Wayne.png" alt="Logo Wayne" class="logo">

            <form action="" class="login-form">
                <div class="form-group">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário">
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                </div>
                <div class="button-group">
                    <button id="botaoLogin" type="button" onclick="validarLogin()">Entrar</button>
                    <button id="botaoVoltar" type="button" onclick="window.location.href='../Templates/paginaInicial.html'">Voltar</button>
                </div>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="../Script/main.js"></script>
    <script src="../Script/servicos.js"></script>
</body>

</html>
